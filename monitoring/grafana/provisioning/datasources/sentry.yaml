apiVersion: 1
datasources:
  - name: Sentry
    type: grafana-sentry-datasource
    uid: sentry
    access: proxy
    isDefault: false
    jsonData:
      # Org-level token authenticates at org scope and can query any project.
      # Value injected via SENTRY_ORG_TOKEN env var — never hardcoded.
      orgSlug: jacquesbeukesgmailcom
    secureJsonData:
      authToken: ${SENTRY_ORG_TOKEN}
