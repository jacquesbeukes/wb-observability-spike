auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

pattern_ingester:
  enabled: true

limits_config:
  metric_aggregation_enabled: true
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8
  max_streams_per_user: 10000
  max_label_names_per_series: 15
  max_label_value_length: 2048
  # 31 days — matches the S3 lifecycle rule in the production-grade delivery
  retention_period: 744h
