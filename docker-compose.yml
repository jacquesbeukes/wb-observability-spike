# Observability platform — local development stack
# Provides: Prometheus, Loki, Grafana, OTel Collector, Blackbox Exporter
#
# The monitored application (AI Chat Middleware) runs separately in its own repo.
# Connect it to this stack by adding it to the shared network:
#
#   networks:
#     - observability
#   environment:
#     - LOKI_URI=http://loki:3100
#     - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#     - ANGULAR_OTLP_ENDPOINT=http://otel-collector:4318
#     - ENV_NAME=local
#     - SENTRY_DSN=<dsn>
#
# Prerequisites: copy .env.example to .env and fill in values.
#
# Usage:
#   docker compose up -d
#   docker compose down -v   # also removes volumes

networks:
  observability:
    name: observability        # stable name so external compose files can join

services:
  prometheus:
    image: prom/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    networks:
      - observability
    restart: unless-stopped

  loki:
    image: grafana/loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    ports:
      - "9115:9115"
    networks:
      - observability
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./monitoring/otel-collector/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP — .NET backend
      - "4318:4318"   # HTTP OTLP — Angular frontend (browsers cannot use gRPC)
      - "18888:18888" # Collector internal metrics (platform-self scrape target; 8888 in use on this host)
    networks:
      - observability
    restart: unless-stopped

  grafana:
    build:
      context: ./monitoring
      dockerfile: Dockerfile.grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - SENTRY_ORG_TOKEN=${SENTRY_ORG_TOKEN}
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
